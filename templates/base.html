<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}DocShare{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --card: #1a1a24; --border: #2a2a38;
      --accent: #e8ff47; --accent2: #ff6b6b; --accent3: #64ffda;
      --text: #f0f0f5; --muted: #7070a0;
      --radius: 12px;
      --font-ui: 'Syne', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-ui); min-height: 100vh; overflow-x: hidden; }

    /* nav */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2.5rem;
      background: rgba(10,10,15,.9); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-size: 1.4rem; font-weight: 800; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 1rem; align-items: center; }
    .nav-links a { text-decoration: none; color: var(--muted); font-size: .85rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; transition: color .2s; }
    .nav-links a:hover { color: var(--text); }

    /* buttons */
    .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .5rem 1.2rem; border-radius: 999px; font-family: var(--font-ui); font-weight: 700; font-size: .85rem; letter-spacing: .04em; text-transform: uppercase; text-decoration: none; cursor: pointer; border: none; transition: transform .15s, box-shadow .15s, opacity .15s; }
    .btn-primary { background: var(--accent); color: #0a0a0f; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,255,71,.25); color: #0a0a0f; }
    .btn-danger { background: rgba(255,107,107,.15); color: var(--accent2); border: 1px solid rgba(255,107,107,.3); }
    .btn-danger:hover { background: rgba(255,107,107,.25); }
    .btn-ghost { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .btn-teal { background: rgba(100,255,218,.12); color: var(--accent3); border: 1px solid rgba(100,255,218,.25); }
    .btn-teal:hover { background: rgba(100,255,218,.22); }

    /* layout */
    main { position: relative; z-index: 1; padding: 2.5rem; max-width: 1400px; margin: 0 auto; }

    /* hero */
    .hero { border: 1px solid var(--border); border-radius: var(--radius); padding: 3rem; margin-bottom: 3rem; background: var(--surface); display: flex; align-items: center; justify-content: space-between; gap: 2rem; overflow: hidden; position: relative; }
    .hero::after { content: ''; position: absolute; right: -80px; top: -80px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(232,255,71,.12) 0%, transparent 70%); }
    .hero h1 { font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 800; line-height: 1.1; }
    .hero h1 em { color: var(--accent); font-style: normal; }
    .hero p { color: var(--muted); margin-top: .75rem; max-width: 480px; }

    /* section headings */
    .section-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
    .section-header h2 { font-size: 1.2rem; font-weight: 700; }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: inline-flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; color: #0a0a0f; flex-shrink: 0; }
    .divider { height: 1px; background: var(--border); flex: 1; }
    .file-count { font-family: var(--font-mono); font-size: .75rem; color: var(--muted); }
    .user-section { margin-bottom: 3.5rem; }

    /* cards */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.25rem; }
    .file-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; transition: transform .2s, border-color .2s, box-shadow .2s; }
    .file-card:hover { transform: translateY(-4px); border-color: rgba(232,255,71,.4); box-shadow: 0 12px 40px rgba(232,255,71,.07); }
    .card-thumb { width: 100%; aspect-ratio: 16/9; position: relative; overflow: hidden; cursor: pointer; }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .card-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a28, #22223a); }
    .file-type-icon { font-size: 3rem; opacity: .7; }
    .card-badge { position: absolute; top: 8px; right: 8px; padding: .2rem .55rem; border-radius: 6px; font-family: var(--font-mono); font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
    .badge-pdf  { background: rgba(255,107,107,.2); color: #ff6b6b; border: 1px solid rgba(255,107,107,.3); }
    .badge-ppt, .badge-pptx { background: rgba(255,159,67,.2); color: #ff9f43; border: 1px solid rgba(255,159,67,.3); }
    .card-body { padding: 1rem; flex: 1; display: flex; flex-direction: column; gap: .4rem; }
    .card-title { font-size: 1rem; font-weight: 700; line-height: 1.3; }
    .card-meta  { font-size: .75rem; color: var(--muted); font-family: var(--font-mono); }
    .card-actions { display: flex; gap: .4rem; margin-top: auto; padding-top: .75rem; flex-wrap: wrap; }
    .btn-card { flex: 1; padding: .45rem .5rem; border-radius: 8px; font-size: .78rem; font-weight: 700; text-decoration: none; text-align: center; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; white-space: nowrap; font-family: var(--font-ui); }
    .btn-card:hover { background: var(--surface); color: var(--text); }
    .btn-card.primary { background: var(--accent); color: #0a0a0f; border-color: var(--accent); }
    .btn-card.primary:hover { opacity: .85; }
    .btn-card.edit { color: var(--accent3); border-color: rgba(100,255,218,.3); }
    .btn-card.edit:hover { background: rgba(100,255,218,.1); }
    .btn-card.del { color: var(--accent2); border-color: rgba(255,107,107,.3); }
    .btn-card.del:hover { background: rgba(255,107,107,.1); }

    /* empty */
    .empty { text-align: center; padding: 5rem 2rem; color: var(--muted); }
    .empty .empty-icon { font-size: 4rem; margin-bottom: 1rem; opacity: .4; }
    .empty h3 { font-size: 1.4rem; margin-bottom: .5rem; color: var(--text); }

    /* toast */
    #toast { position: fixed; bottom: 2rem; right: 2rem; z-index: 999; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.5rem; font-size: .9rem; max-width: 320px; transform: translateY(120%); opacity: 0; transition: transform .3s, opacity .3s; }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: var(--accent); color: var(--accent); }
    #toast.error   { border-color: var(--accent2); color: var(--accent2); }

    /* delete modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; max-width: 380px; width: 90%; }
    .modal h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: .75rem; }
    .modal p  { color: var(--muted); font-size: .9rem; margin-bottom: 1.5rem; line-height: 1.6; }
    .modal-actions { display: flex; gap: .75rem; justify-content: flex-end; }

    @media (max-width: 640px) {
      nav { padding: 1rem 1.25rem; }
      main { padding: 1.25rem; }
      .hero { padding: 1.75rem; flex-direction: column; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
<nav>
  <a class="nav-logo" href="/">Doc<span>Share</span></a>
  <div class="nav-links">
    <a href="/">Browse</a>
    <a class="btn btn-primary" href="/upload">+ Upload</a>
  </div>
</nav>

<main>{% block content %}{% endblock %}</main>

<div id="toast"></div>

<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>Delete this file?</h3>
    <p>This permanently removes the file and its thumbnail from storage. This cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">Yes, Delete</button>
    </div>
  </div>
</div>

<script>
  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    setTimeout(() => t.className = '', 3500);
  }

  let _deleteId = null;
  function confirmDelete(id) {
    _deleteId = id;
    document.getElementById('deleteModal').classList.add('open');
  }
  function closeModal() {
    document.getElementById('deleteModal').classList.remove('open');
    _deleteId = null;
  }
  document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
    if (!_deleteId) return;
    const id = _deleteId;
    closeModal();
    try {
      const r = await fetch('/file/' + id + '/delete', { method: 'POST' });
      const d = await r.json();
      if (d.ok) {
        showToast('File deleted.', 'success');
        setTimeout(() => location.href = d.redirect, 1000);
      } else {
        showToast(d.error || 'Delete failed', 'error');
      }
    } catch(e) {
      showToast('Network error', 'error');
    }
  });
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
